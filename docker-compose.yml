version: "3.9"

services:
  # ── API Server ────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - COCO_DEBUG=true
      - COCO_AUDIT_ENABLED=true
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - coco-network

  # ── PostgreSQL (for audit projection) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crisiscost
      POSTGRES_USER: coco
      POSTGRES_PASSWORD: coco_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/services/audit_projection.py:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coco -d crisiscost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coco-network

  # ── Redis (for caching / rate limiting) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coco-network

  # ── Temporal Server (for workflow orchestration) ──────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
      - "8080:8080"  # Temporal UI
    environment:
      - DB=postgres
      - DB_PORT=5432
      - POSTGRES_USER=coco
      - POSTGRES_PWD=coco_dev_password
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coco-network

volumes:
  postgres-data:

networks:
  coco-network:
    driver: bridge
